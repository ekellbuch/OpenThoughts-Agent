# axolotl SFT — Qwen3-32B, learning-parity port of LLaMA-Factory
# sft/lf_configs/qwen3/32k_base_32b.yaml (bs=96). Launched via
# `python -m hpc.launch --job_type sft --sft_backend axolotl`.
#
# ⚠ DESIGN RATIONALE LIVES IN THE OPS DOC, NOT HERE — see
# .claude/projects/axolotl/axolotl.md § "Qwen3-32B LF-parity SFT config":
# the LF→axolotl learning-parity map, the chatml-vs-qwen3 chat-template/masking
# decision, the sdpa/liger/offload deviations, the 32B OOM diagnosis (config gap:
# liger-off + offload-off — NOT a capacity ceiling), and the shared-$SCRATCH
# dataset-prep sentinel fast-path. Do NOT re-embed knowledge in these comments;
# update the ops doc instead.

base_model: Qwen/Qwen3-32B
trust_remote_code: true

# ZeRO-3. Offload currently OFF pending the cpu_adam toolchain fix (axolotl.md gotcha #2 —
# offload IS achievable on this aarch64 GH200; LF does it on Jupiter).
# `deepspeed:` is only the ON/OFF toggle — its PATH value is IGNORED by the translator
# (hpc/axolotl_config_utils.py: ax["deepspeed"] = deepspeed_config or hardcoded default).
# The honored path key is `deepspeed_config:` below → shard-save variant (16-bit gather OFF).
deepspeed: true
# SAVE SHARDED — gather_16bit_weights_on_model_save: false. The consolidated-16bit GATHER on
# checkpoint save (save_steps=10) deadlocks the 16-node Vista GH200 IB fabric: the 16-way
# _ALLGATHER_BASE that reconstructs the full 32B model on every rank hangs the full PG timeout
# (CONFIRMED, stack-trace-definitive: job 823417 exp _15, step-10 save; the end-of-training
# save_model uses the identical gather → would hang the same way). Sharded save skips the gather
# → RESUMABLE per-rank shards + zero_to_fp32.py; consolidate at cleanup before HF upload.
# agent_logs/2026-07-12_tacc_axolotl32b_nccl_save_gather_hang.md.
deepspeed_config: sft/axolotl_configs/deepspeed/zero3_bf16_shardsave.json

# NOTE: the launcher REBUILDS this datasets block from --dataset + --role_tag/--content_tag
# at launch (hpc/axolotl_config_utils.py::_build_datasets); this in-config block is honored
# ONLY by a direct `axolotl.cli.preprocess`.
datasets:
  - path: open-thoughts/OpenThoughts-Agent-SFT-10K
    type: chat_template
    field_messages: conversations
    message_property_mappings:
      role: role
      content: content
    split_thinking: false

# chatml == LF qwen3 encode_multiturn training format (NOT qwen3.jinja — see ops doc).
chat_template: chatml

# Shared pre-tokenized path: pre-tokenize once via `axolotl preprocess` -> sentinel fast-path
# for concurrent multi-node load_from_disk (rationale in ops doc). $SCRATCH expanded by translator.
dataset_prepared_path: $SCRATCH/axolotl_prepared/qwen3_32b_ot_sft_10k

# Flash-Attention-2 (~2x over SDPA on GH200; SDPA was ~338 s/it — the throughput blocker).
# aarch64 prebuilt wheel flash_attn-2.8.3+cu128torch2.11-cp312 installed 2026-07-11
# (mjun0812/flash-attention-prebuild-wheels v0.9.22; exact torch2.11/cu128/py312/aarch64 match).
# `flash_attention: true` -> translator sets attn_implementation: flash_attention_2
# (hpc/axolotl_config_utils.py L211-221). The old explicit `attn_implementation: sdpa` is
# REMOVED because an explicit value WINS in the translator and would override flash-attn.
flash_attention: true
sample_packing: false

# Liger fused kernels (LF parity: `enable_liger_kernel: true`). The load-bearing
# memory lever for the 32B@32k OOM — LigerFusedLinearCrossEntropy fuses the LM head
# + cross-entropy so the ~18 GB logit tensor (seq 32768 × vocab ~152k × bf16) never
# materializes (the exact allocation that OOM'd in the ZeRO-3 backward). The
# translator (hpc/axolotl_config_utils.py) turns this into the LigerPlugin +
# liger_rope/liger_rms_norm/liger_glu_activation/liger_fused_linear_cross_entropy.
# CPU offload stays OFF for this relaunch — liger alone should fit per the OOM
# diagnosis (axolotl.md §Qwen3-32B); offload is the next lever if needed.
enable_liger_kernel: true

sequence_len: 32768
val_set_size: 0.0
dataset_num_proc: 1          # aarch64/TACC AF_UNIX-path-too-long on multiproc tokenization

# Effective batch 96; micro=1, gpus_per_node=1 -> grad_accum = 96 / num_nodes (translator-derived).
global_batch_size: 96
micro_batch_size: 1

num_epochs: 7.0
learning_rate: 4.0e-5
lr_scheduler_type: cosine    # translator -> lr_scheduler
warmup_ratio: 0.1
max_grad_norm: 1.0e-4
optim: adamw_torch_fused     # translator -> optimizer
weight_decay: 0.0

bf16: true                   # translator -> bf16: auto (mixed bf16 + fp32 master)
tf32: false
gradient_checkpointing: true

logging_steps: 5
# save_steps RAISED back to 200 (2026-07-12): the low cadences (100->30->10) were a DEBUG band-aid
# for the step-10 save-gather NCCL hang, which is now FIXED at the source by the sharded-save
# deepspeed config (gather_16bit_weights_on_model_save:false; zero3_bf16_shardsave.json) — saves no
# longer do the 16-node _ALLGATHER_BASE that deadlocked, so there's no reason to checkpoint every 10
# steps (that banked ~8 wasteful 32B ZeRO-3 shard sets by step 85). 200 is the normal cadence: for a
# 704-step run that's saves at 200/400/600 + the final. save_total_limit=3 caps disk (latest 3 shard
# sets kept — safe for auto_resume, which needs the latest intact; NOT 1, which risks losing the
# latest mid-rotation). Learning-neutral (save cadence only).
# agent_logs/2026-07-12_tacc_axolotl32b_nccl_save_gather_hang.md.
save_steps: 200
save_total_limit: 3
# Resume from the latest output_dir checkpoint on relaunch — makes `--max_restarts` / an
# afterany chain leg RESUME (not restart from step 0) for the axolotl backend. Needs the
# translator passthrough (hpc/axolotl_config_utils.py). Fresh runs (empty output_dir) start
# clean; 7-epoch/704-step runs exceed the 48h TACC wall and need this to finish.
auto_resume_from_checkpoints: true

# no DB row, no MFU noise (learning-neutral).
supabase_register: false
mfu: false

output_dir: ./outputs/qwen3-32b-ot-sft-10k
