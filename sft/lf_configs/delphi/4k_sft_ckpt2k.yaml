### 4k-context instruction-following SFT — frequent-checkpoint variant (Delphi #6279)
#
# IDENTICAL to 4k_sft.yaml EXCEPT for the checkpoint cadence (save_steps /
# save_total_limit). These are checkpointing-cadence knobs ONLY — they do NOT
# affect the optimization (LR/epochs/data/seed unchanged), so the grid's
# LR x dataset comparison is unaffected.
#
# WHY: the base config sets save_steps=24107 (= S*, the compute-matched grid
# checkpoint). For the slow 32B (32p07b) cells, one 24h wall only reaches
# ~17.3k/26.8k steps — BELOW 24107 — so NO checkpoint is ever written and the
# --max_restarts resume chain has nothing to resume from (24h of compute wasted).
# This variant saves every 2000 steps so each wall leaves a resumable checkpoint;
# the chain then resumes across walls until the full 1-epoch run (26788 steps)
# completes. Use this for any cell whose total_steps the model can't reach in 24h.

### HPC Launch Settings
global_batch_size: 16
# gradient_accumulation_steps = global_batch_size // (num_nodes * gpus_per_node)

### model
model_name_or_path: laion/delphi-3e18-p33m67-k0p20-lr83-a003   # PLACEHOLDER — overridden per run via --model_path
trust_remote_code: true
attn: fa2
enable_liger_kernel: true
optim: adamw_torch_fused

### method
stage: sft
do_train: true
finetuning_type: full
deepspeed: sft/lf_configs/deepspeed/ds_z3_accelerate.json
include_mfu: true

### dataset
# dataset(s) passed at launch from the registry (--dataset_dir sft/delphi). Do NOT hardcode `dataset:`.
template: delphi
cutoff_len: 4096
overwrite_cache: true
preprocessing_num_workers: 16
dataloader_persistent_workers: true
dataloader_pin_memory: true
dataloader_num_workers: 4

### output
logging_steps: 5
save_strategy: "steps"
# Frequent checkpointing so a 24h wall always leaves a resumable checkpoint
# (the slow 32B can't reach the base config's 24107 in one wall). Cadence-only
# change; does not affect the optimization.
save_steps: 2000
save_total_limit: 3
load_best_model_at_end: false
logging_strategy: "steps"
plot_loss: true
report_to: wandb

### train
# NOTE: this wc386k cell ran at lr1e-5 (the rendered config + hub_model_id
# `_lr1e5` confirm it; the launch passed --learning_rate 1e-05 over the base
# 2e-5). Baked in here to match exactly — do NOT change mid-series.
learning_rate: 1.0e-5
num_train_epochs: 1.0
max_grad_norm: 1.0
adam_beta2: 0.98
lr_scheduler_type: cosine
warmup_ratio: 0.1
bf16: true
pure_bf16: false
gradient_checkpointing: true
ddp_timeout: 180000000
push_to_hub: false
