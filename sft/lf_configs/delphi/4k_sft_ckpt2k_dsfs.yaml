### 4k-context instruction-following SFT — frequent-checkpoint + shared-FS-safe variant (Delphi #6279)
#
# IDENTICAL to 4k_sft_ckpt2k.yaml EXCEPT for `data_shared_file_system: true`.
# This is an INFRA/CORRECTNESS knob ONLY — it changes no training math
# (LR/epochs/data/seed/tokens/loss unchanged), so the grid's LR x dataset
# comparison is unaffected.
#
# WHY: on multi-node SFT, LLaMA-Factory gates dataset prep with
# `main_process_first(..., local=(not data_shared_file_system))`. With the
# default false, the barrier is PER-NODE, so each node's local-rank-0 runs
# `datasets.map` (the "Converting format" / align_dataset step) SIMULTANEOUSLY
# against the same shared GPFS cache dir. They race: a non-rank-0 node reads an
# Arrow cache shard mid-write and hits
#   `OSError: Expected to be able to read N bytes for message body, got M`,
# that rank dies, the surviving ranks' collective hangs, and the NCCL watchdog
# SIGABRTs at the 600s mark — the job then idles to the 24h wall with no
# checkpoint. (Observed 2026-06-15 on this exact 1e22 magpie cell: job
# 46798966, rank 8 / lrdn0140 — the truncated-shard OSError → watchdog SIGABRT.)
#
# Fix: `data_shared_file_system: true` => GLOBAL barrier, only global-rank-0
# tokenizes + writes the shared cache, everyone else waits then reads. Safe to
# use mid-grid (no methodology change).

### HPC Launch Settings
global_batch_size: 16
# gradient_accumulation_steps = global_batch_size // (num_nodes * gpus_per_node)

### model
model_name_or_path: laion/delphi-3e18-p33m67-k0p20-lr83-a003   # PLACEHOLDER — overridden per run via --model_path
trust_remote_code: true
attn: fa2
enable_liger_kernel: true
optim: adamw_torch_fused

### method
stage: sft
do_train: true
finetuning_type: full
deepspeed: sft/lf_configs/deepspeed/ds_z3_accelerate.json
include_mfu: true

### dataset
# dataset(s) passed at launch from the registry (--dataset_dir sft/delphi). Do NOT hardcode `dataset:`.
template: delphi
cutoff_len: 4096
overwrite_cache: true
preprocessing_num_workers: 16
dataloader_persistent_workers: true
dataloader_pin_memory: true
dataloader_num_workers: 4
# Multi-node cache-race fix (global barrier; only global-rank-0 writes the shared cache).
data_shared_file_system: true

### output
logging_steps: 5
save_strategy: "steps"
# Frequent checkpointing so a 24h wall always leaves a resumable checkpoint
# (the slow 32B can't reach the base config's 24107 in one wall). Cadence-only
# change; does not affect the optimization.
save_steps: 2000
save_total_limit: 3
load_best_model_at_end: false
logging_strategy: "steps"
plot_loss: true
report_to: wandb

### train
# NOTE: this wc386k cell ran at lr1e-5 (the rendered config + hub_model_id
# `_lr1e5` confirm it; the launch passed --learning_rate 1e-05 over the base
# 2e-5). Baked in here to match exactly — do NOT change mid-series.
learning_rate: 1.0e-5
num_train_epochs: 1.0
max_grad_norm: 1.0
adam_beta2: 0.98
lr_scheduler_type: cosine
warmup_ratio: 0.1
bf16: true
pure_bf16: false
gradient_checkpointing: true
ddp_timeout: 180000000
push_to_hub: false
