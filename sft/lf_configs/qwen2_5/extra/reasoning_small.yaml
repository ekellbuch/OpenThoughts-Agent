logging_steps: 1
save_strategy: epoch
plot_loss: true

global_batch_size: 96
learning_rate: 2.0e-5
num_train_epochs: 7.0
lr_scheduler_type: cosine
warmup_ratio: 0.1
bf16: true
ddp_timeout: 180000000
