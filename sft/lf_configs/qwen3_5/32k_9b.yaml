### HPC Launch Settings
global_batch_size: 96
# gradient_accumulation_steps = global_batch_size // (num_nodes * gpus_per_node)

### model
# REQUIRES: transformers >= 5.3.0 (Qwen3.5 uses a hybrid Gated DeltaNet + Gated Attention architecture
# not supported in transformers 4.x). Upgrade before use:
#   pip install "transformers>=5.3.0"
model_name_or_path: Qwen/Qwen3.5-9B
trust_remote_code: true
attn: sdpa
# Liger kernel: fused cross-entropy avoids materializing full vocab logits (~30 GiB).
# DeltaNet layers are unaffected — Liger only fuses attention + CE for standard layers.
enable_liger_kernel: true
optim: adamw_torch_fused

### method
stage: sft
do_train: true
finetuning_type: full
# DeepSpeed ZeRO-3 with optimizer-only offload (no param offload, no pin_memory).
# FSDP breaks with CCE hooks. DeepSpeed may handle chunked CE backward differently.
deepspeed: sft/lf_configs/deepspeed/ds_z3_optim_offload.json
include_mfu: true

### dataset
# Qwen3.5 may need a new template in LLaMA-Factory. Try qwen3 first; if tokenization
# is wrong (different special tokens / thinking format), register a qwen3_5 template.
template: qwen3
cutoff_len: 32768
# Qwen3.5-9B has 262k native context, so 32k is well within range — no rope_scaling needed.
overwrite_cache: true
preprocessing_num_workers: 16
dataloader_persistent_workers: true
dataloader_pin_memory: true
dataloader_num_workers: 4

### output
logging_steps: 5
save_strategy: "steps"
save_steps: 200
save_total_limit: 1
load_best_model_at_end: false
logging_strategy: "steps"
plot_loss: true

### train
learning_rate: 4.0e-5
num_train_epochs: 7.0
max_grad_norm: 1.0e-4
adam_beta2: 0.98
lr_scheduler_type: cosine
warmup_ratio: 0.1
bf16: true
pure_bf16: false
gradient_checkpointing: true
# Cut Cross-Entropy: computes loss without materializing full [seq_len × vocab_size]
# logits tensor. Essential for Qwen3.5's 151k vocab at 32k context (would be 30 GiB).
use_cce: true
ddp_timeout: 180000000
push_to_hub: false
