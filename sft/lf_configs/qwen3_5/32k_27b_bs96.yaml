### HPC Launch Settings
global_batch_size: 96
# gradient_accumulation_steps = global_batch_size // (num_nodes * gpus_per_node)
# With 24 nodes × 4 GPUs = 96 GPUs → grad_accum = 1

### model
# REQUIRES: transformers >= 5.3.0 (Qwen3.5 uses a hybrid Gated DeltaNet + Gated Attention architecture
# not supported in transformers 4.x). Upgrade before use:
#   pip install "transformers>=5.3.0"
model_name_or_path: Qwen/Qwen3.5-27B
trust_remote_code: true
attn: sdpa
# NOTE: Liger kernel may not support Qwen3.5's hybrid architecture (Gated DeltaNet layers).
# CCE (Cut Cross-Entropy) handles the vocab logit reduction instead.
enable_liger_kernel: false
optim: adamw_torch_fused

### method
stage: sft
do_train: true
finetuning_type: full
# 27B needs CPU optimizer offload (similar to Qwen3-32B)
deepspeed: sft/llamafactory/examples/deepspeed/ds_z3_offload_nomat_config.json
include_mfu: true

### dataset
template: qwen3
cutoff_len: 32768
# Qwen3.5-27B has 262k native context, so 32k needs no rope_scaling.
overwrite_cache: true
preprocessing_num_workers: 16
dataloader_persistent_workers: true
dataloader_pin_memory: true
dataloader_num_workers: 4

### output
logging_steps: 5
save_strategy: "steps"
save_steps: 400
save_total_limit: 1
load_best_model_at_end: false
logging_strategy: "steps"
plot_loss: true

### train
learning_rate: 4.0e-5
num_train_epochs: 7.0
max_grad_norm: 1.0e-4
adam_beta2: 0.98
lr_scheduler_type: cosine
warmup_ratio: 0.1
bf16: true
pure_bf16: false
gradient_checkpointing: true
# Cut Cross-Entropy: computes loss without materializing full [seq_len × vocab_size]
# logits tensor. Essential for Qwen3.5's 151k vocab at 32k context.
use_cce: true
ddp_timeout: 180000000
push_to_hub: false
