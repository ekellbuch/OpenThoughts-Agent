name: Ruff


on:
  pull_request:
    branches: ["main", "penfever/working"]
  push:
    branches: ["main", "penfever/working"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint-and-format:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install the latest version of uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Run ruff linting (tests/)
        run: uvx ruff@0.15.14 check tests/

      - name: Run ruff formatting check (tests/)
        run: uvx ruff@0.15.14 format --check tests/
