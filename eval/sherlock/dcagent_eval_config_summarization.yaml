# Run 5: Summarization timeout experiment.
# Changes from dcagent_eval_config.yaml:
#   - summarization_timeout: 600 (was default 300)
#   - n_concurrent_trials: 8 (was 16) — halves GPU contention
#   - SummarizationTimeoutError excluded from retries

jobs_dir: /scratch/groups/swl1/ekb/data/coding_agent/outputs/harbor/eval_jobs
n_attempts: 3
timeout_multiplier: 1.0
orchestrator:
  type: local
  n_concurrent_trials: 8
  quiet: false
  retry:
    max_retries: 3
    exclude_exceptions:
      - AgentTimeoutError
      - EnvironmentStartTimeoutError
      - SandboxBuildFailedError
      - VerifierTimeoutError
      - SummarizationTimeoutError
    wait_multiplier: 1.0
    min_wait_sec: 1.0
    max_wait_sec: 60.0
environment:
  type: apptainer
  force_build: false
  delete: false
  kwargs:
    image_cache_dir: /scratch/groups/swl1/ekb/.cache/harbor
    use_fakeroot: true
    default_cwd: /app
    default_env:
      TMPDIR: /tmp
    extra_binds:
      - /home/groups/swl1/ekb/Projects/coding_agent/scripts/harbor/tools/bin/uv:/usr/local/bin/uv:ro
      - /home/groups/swl1/ekb/Projects/coding_agent/scripts/harbor/tools/bin/uvx:/usr/local/bin/uvx:ro
      - /home/groups/swl1/ekb/Projects/coding_agent/scripts/harbor/tools/etc/99-no-sandbox.conf:/etc/apt/apt.conf.d/99-no-sandbox:ro
      - /home/groups/swl1/ekb/Projects/coding_agent/scripts/harbor/tools/lib/libutempter.so.0:/usr/lib/x86_64-linux-gnu/libutempter.so.0:ro
agents:
  - name: terminus-2
    kwargs:
      summarization_timeout: 600
    trajectory_config:
      raw_content: true
      linear_history: true
datasets:
  - registry: {}
    name: terminal-bench
    version: "2.0"
