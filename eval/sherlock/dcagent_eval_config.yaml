jobs_dir: /home/groups/swl1/ekb/data/coding_agent/outputs/harbor/eval_jobs
n_attempts: 3
timeout_multiplier: 1.0
orchestrator:
  type: local
  n_concurrent_trials: 16
  quiet: false
  retry:
    max_retries: 3
    exclude_exceptions:
      - AgentTimeoutError
      - EnvironmentStartTimeoutError
      - SandboxBuildFailedError
      - VerifierTimeoutError
    wait_multiplier: 1.0
    min_wait_sec: 1.0
    max_wait_sec: 60.0
environment:
  type: apptainer
  force_build: false
  delete: false
  kwargs:
    image_cache_dir: /scratch/groups/swl1/ekb/.cache/harbor
    default_cwd: /app
    default_env:
      TMPDIR: /tmp
    extra_binds:
      - /home/groups/swl1/ekb/Projects/coding_agent/scripts/harbor/tools/bin/uv:/usr/local/bin/uv:ro
      - /home/groups/swl1/ekb/Projects/coding_agent/scripts/harbor/tools/bin/uvx:/usr/local/bin/uvx:ro
agents:
  - name: terminus-2
    trajectory_config:
      raw_content: true
      linear_history: true
datasets:
  - registry: {}
