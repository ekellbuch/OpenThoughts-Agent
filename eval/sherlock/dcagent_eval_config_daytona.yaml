# Harbor eval config for Sherlock — Daytona environment (cloud containers).
# Drop-in replacement for dcagent_eval_config.yaml (Apptainer).
#
# Differences from Apptainer config:
#   - No fakeroot, no bind-mounts, no libutempter hacks
#   - Containers run on Daytona's cloud, not locally
#   - System RAM only needed for vLLM + Harbor orchestrator
#   - Can run much higher concurrency (64-128)
#
# Requires: DAYTONA_API_KEY env var

jobs_dir: /scratch/groups/swl1/ekb/data/coding_agent/outputs/harbor/eval_jobs
n_attempts: 3
timeout_multiplier: 1.0

orchestrator:
  type: local
  n_concurrent_trials: 16
  quiet: false
  retry:
    max_retries: 3
    exclude_exceptions:
      - AgentTimeoutError
      - EnvironmentStartTimeoutError
      - SandboxBuildFailedError
      - VerifierTimeoutError
    wait_multiplier: 1.0
    min_wait_sec: 1.0
    max_wait_sec: 60.0

environment:
  type: daytona
  force_build: true
  delete: true

agents:
  - name: terminus-2
    trajectory_config:
      raw_content: true
      linear_history: true

datasets:
  - registry: {}
    name: terminal-bench
    version: "2.0"
