jobs_dir: eval_jobs
n_attempts: 3
timeout_multiplier: 1.0
orchestrator:
  type: local
  n_concurrent_trials: 16
  quiet: false
  retry:
    max_retries: 3
    exclude_exceptions:
      - AgentTimeoutError
      - EnvironmentStartTimeoutError
      - SandboxBuildFailedError
      - VerifierTimeoutError
      - RewardFileNotFoundError
      - RewardFileEmptyError
      - VerifierOutputParseError
      - VerifierRuntimeError
      - SummarizationTimeoutError
      - ContextLengthExceededError
    wait_multiplier: 1.0
    min_wait_sec: 1.0
    max_wait_sec: 60.0
environment:
  type: daytona
  force_build: false
  delete: false
  kwargs:
    auto_snapshot: true
agents:
  - name: terminus-2
    trajectory_config:
      raw_content: true
      linear_history: true
datasets:
  - path: examples/tasks
