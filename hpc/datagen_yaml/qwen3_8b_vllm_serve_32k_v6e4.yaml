engine:
  type: vllm_local
  model: Qwen/Qwen3-8B
  max_output_tokens: 8192
  healthcheck_interval: 300
  vllm_local: {}
backend:
  type: ray
  wait_for_endpoint: true
vllm_server:
  model_path: Qwen/Qwen3-8B
  num_replicas: 1
  # v6e-4 = 4 chips on 1 host; size the device mesh accordingly.
  tensor_parallel_size: 4
  pipeline_parallel_size: 1
  data_parallel_size: 1
  time_limit: '48:00:00'
  max_model_len: 32768
  # vllm-tpu defaults are serving-shaped (KV cache claims all leftover HBM).
  # Keep concurrent sequences modest on a single v6e-4 to leave compile
  # scratch + room for hybrid-arch state (Qwen3.5 has mamba layers; Qwen3-8B
  # is text-only attention, but small max_num_seqs is a safe default).
  max_num_seqs: 16
  # gpu_memory_utilization is silently ignored by vllm-tpu — kept for schema
  # compatibility with the GPU configs.
  gpu_memory_utilization: 0.9
  # TPU doesn't use host-RAM swap the way CUDA vLLM does.
  swap_space: 0
  enable_expert_parallel: false
  enable_auto_tool_choice: true
  tool_call_parser: hermes
  reasoning_parser: qwen3
  extra_args:
  - --dtype
  - bfloat16
  # vllm-tpu prefers larger KV blocks than the CUDA backend's default-16.
  - --block-size
  - '64'
  - --enable-prefix-caching
  - --max-num-partial-prefills
  - '1'
  # Notes vs the deleted _1xH200.yaml:
  # * --enable-chunked-prefill omitted — vllm-tpu force-disables it on TPU
  #   (Multimodal models also reject chunked MM input on TPU).
  # * --all2all-backend pplx removed — pplx is CUDA/NCCL only.
