engine:
  type: vllm_local
  model: Qwen/Qwen3-8B
  max_output_tokens: 1024
  healthcheck_interval: 600
  vllm_local: {}
backend:
  type: ray
  wait_for_endpoint: true
vllm_server:
  model_path: Qwen/Qwen3-8B
  num_replicas: 1
  # v6e-4 = 4 chips on 1 host; size the device mesh accordingly.
  tensor_parallel_size: 4
  pipeline_parallel_size: 1
  data_parallel_size: 1
  time_limit: '48:00:00'
  # Bumped to 4096 2026-05-21: 1024 caused harbor's terminus-2 agent to
  # immediately fail every trial with
  #   VLLMValidationError: This model's maximum context length is 1024
  #   tokens. However, ... your prompt contains at least 1025 input tokens
  # because the agent's multi-step instruction + tool-call prompt already
  # exceeds 1K on turn 1. 4096 is the smallest power-of-two that fits real
  # terminus-2 prompts while still respecting the TPU HBM envelope on a
  # 4-chip v6e slice (gpu_memory_utilization=0.7, max_num_seqs=2). Bump
  # further if downstream eval logs show prompts hitting the new cap.
  max_model_len: 4096
  max_num_seqs: 2
  # vllm-tpu honors this for KV-cache sizing (confirmed via Stage-C smoke,
  # despite earlier launcher comments claiming otherwise). 0.70 leaves
  # headroom for the XLA compile scratch space + per-step state of
  # hybrid mamba layers.
  gpu_memory_utilization: 0.70
  # TPU doesn't use host-RAM swap the way CUDA vLLM does.
  swap_space: 0
  enable_expert_parallel: false
  enable_auto_tool_choice: true
  tool_call_parser: hermes
  reasoning_parser: qwen3
  extra_args:
  - --dtype
  - bfloat16
  # vllm-tpu prefers larger KV blocks than the CUDA backend's default-16.
  - --block-size
  - '64'
  - --max-num-partial-prefills
  - '1'
  # Qwen3.5-4B is a multimodal model (image-text-to-text architecture);
  # vllm-tpu refuses to compile MM tower kernels on TPU unless we cap MM
  # inputs to zero. The harbor eval (terminus-2 on openthoughts-tblite)
  # is text-only so zero is correct. Harmless for text-only models like
  # Qwen3-8B since they ignore the limit. Lives in extra_args because
  # VLLMServerConfig doesn't model this knob.
  - --limit-mm-per-prompt
  - '{"image":0,"video":0}'
  # Notes vs the deleted _1xH200.yaml:
  # * --enable-chunked-prefill omitted — vllm-tpu force-disables it on TPU
  #   (Multimodal models also reject chunked MM input on TPU).
  # * --enable-prefix-caching omitted — incompatible with hybrid GDN
  #   architectures on the TPU compile path (caches attention KV but not
  #   the mamba SSM state, which corrupts decode).
  # * --all2all-backend pplx removed — pplx is CUDA/NCCL only.
