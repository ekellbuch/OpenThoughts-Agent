# MiniMax-M2.7-AWQ-4bit — DP=2 COMPILED, fuse_allreduce_rms DISABLED (2026-05-27)
# https://huggingface.co/cyankiwi/MiniMax-M2.7-AWQ-4bit
#
# THE FIX TEST. The DP=2 cudagraph-capture "illegal memory access" root cause
# was found via CUDA_LAUNCH_BLOCKING (job 523024): the synchronous traceback
# names `trtllm_mnnvl_allreduce_fusion` (flashinfer) invoked by vLLM's
# `fuse_allreduce_rms` compilation pass — NOT the MoE all-to-all. MNNVL =
# Multi-Node NVLink; Jupiter's cross-node transport is InfiniBand, so at DP>1
# the MNNVL fused-allreduce+RMSNorm kernel writes to a non-existent NVLink-peer
# address → illegal memory access during profile_cudagraph_memory. (DP=1 works
# because the allreduce is intra-node where NVLink is real.) See
# agent_logs/2026-05-27_minimax_dp2_compiled_capture_crash.md.
#
# FIX: disable the fusion pass → falls back to standard NCCL allreduce +
# separate RMSNorm (IB-capable). If capture succeeds, compiled DP>1 is unblocked.
#
# DELTA vs dp2_cudagraph.yaml: + --compilation-config
# '{"pass_config":{"fuse_allreduce_rms":false}}'. cudagraphs still ON
# (FULL_AND_PIECEWISE), enforce_eager still OFF. NO CUDA_LAUNCH_BLOCKING
# (fast run).
#
# Required launch flags: --num_nodes 2 --gpus_per_node 4

engine:
  type: vllm_local
  model: cyankiwi/MiniMax-M2.7-AWQ-4bit
  max_output_tokens: 8192
  healthcheck_interval: 300
  request_params:
    temperature: 0.7
    top_p: 0.95
  vllm_local: {}
backend:
  type: ray
  wait_for_endpoint: true
  ray_cgraph_max_inflight_executions: 16
  healthcheck_max_attempts: 160
  healthcheck_retry_delay: 15
vllm_server:
  model_path: cyankiwi/MiniMax-M2.7-AWQ-4bit
  num_replicas: 1
  tensor_parallel_size: 4
  pipeline_parallel_size: 1
  data_parallel_size: 2
  time_limit: '11:59:00'
  max_model_len: 32768
  max_num_seqs: 32
  gpu_memory_utilization: 0.9
  enable_expert_parallel: true
  enable_auto_tool_choice: true
  tool_call_parser: minimax_m2
  reasoning_parser: minimax_m2
  trust_remote_code: true
  use_deep_gemm: false
  use_flashinfer_sampler: false
  use_flashinfer_moe_fp16: true
  pynccl_trace_flush_interval_sec: 300
  pynccl_pyspy_on_sigusr1: true
  pynccl_faulthandler_interval_sec: 0
  extra_args:
  - --dtype
  - bfloat16
  - --kv-cache-dtype
  - fp8
  # THE FIX: disable vLLM's fuse_allreduce_rms compilation pass so it does not
  # select flashinfer's TRT-LLM MNNVL fused allreduce+RMSNorm (which illegal-
  # accesses cross-node on IB). Falls back to NCCL allreduce + separate RMSNorm.
  - --compilation-config
  - '{"pass_config":{"fuse_allreduce_rms":false}}'
  - --chat-template-content-format
  - string
  - --max-num-batched-tokens
  - '32768'
  - --all2all-backend
  - allgather_reducescatter
  - --data-parallel-backend
  - ray
  - --data-parallel-size-local
  - '1'
