# Qwen3.5-122B-A10B-FP8 — SINGLE-HOST v5p-8 TP=4 fit test.
#
# Hypothesis: 122B-FP8 fits one v5p-8 host. v5p-8 = 4 chips, 95 GiB HBM/chip
# = 380 GiB total (vs v6e-8's 32 GiB/chip which OOM'd). FP8 weights ~122 GB
# / TP=4 = ~30.5 GiB/chip → ~64 GiB/chip free for KV + the XLA compile
# working set. The earlier v5p-8 attempt (v7) OOM'd by only ~3 GiB at the
# 32k compile, but that was with the block-size=2096 bloat (32x the working
# value); block-size=64 should shrink the paged-attention compile buffers
# well under the 95 GiB budget here.
#
# Single host => iris vm_count=1 => replicas=1 => ONE task, ONE JAX process:
# no multi-process device_put issue, no harbor duplication, no Ray cluster.
# The default local-Ray start_vllm_ray_controller path serves this as-designed.
#
# TP=4 is valid for FP8 weight_block_size [128,128] (moe_intermediate 1024 /
# 128 = 8 max TP; per-shard 256 >= 128). TP=4 fills the v5p-8's 4 chips.

env_vars:
  RUNAI_STREAMER_CONCURRENCY: '4'
  MODEL_IMPL_TYPE: vllm
  AWS_ENDPOINT_URL: https://storage.googleapis.com

engine:
  type: vllm_local
  model: gs://marin-models-us/ot-agent/models/Qwen/Qwen3.5-122B-A10B-FP8/
  max_output_tokens: 8192
  healthcheck_interval: 1800
  vllm_local: {}
backend:
  type: ray
  wait_for_endpoint: true
vllm_server:
  model_path: gs://marin-models-us/ot-agent/models/Qwen/Qwen3.5-122B-A10B-FP8/
  num_replicas: 1
  tensor_parallel_size: 4
  pipeline_parallel_size: 1
  data_parallel_size: 1
  time_limit: '48:00:00'
  max_model_len: 32768
  max_num_seqs: 1
  gpu_memory_utilization: 0.85
  enable_expert_parallel: true
  enable_auto_tool_choice: true
  tool_call_parser: qwen3_coder
  reasoning_parser: qwen3
  trust_remote_code: true
  extra_args:
  - --dtype
  - bfloat16
  - --load-format
  - runai_streamer
  - --block-size
  - '64'
  - --max-num-partial-prefills
  - '1'
  - --limit-mm-per-prompt
  - '{"image":0,"video":0}'
  - --max-num-batched-tokens
  - '32768'
