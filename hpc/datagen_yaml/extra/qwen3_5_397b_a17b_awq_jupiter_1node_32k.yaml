
engine:
  type: vllm_local
  model: QuantTrio/Qwen3.5-397B-A17B-AWQ
  max_output_tokens: 16384
  healthcheck_interval: 300
  request_params:
    temperature: 1.0
    top_p: 0.95
  vllm_local: {}
backend:
  type: ray
  wait_for_endpoint: true
  ray_cgraph_max_inflight_executions: 16
  healthcheck_max_attempts: 160
  healthcheck_retry_delay: 15
vllm_server:
  model_path: QuantTrio/Qwen3.5-397B-A17B-AWQ
  num_replicas: 1
  tensor_parallel_size: 4
  pipeline_parallel_size: 1
  data_parallel_size: 1
  time_limit: '11:59:00'
  max_model_len: 32768
  max_num_seqs: 32
  gpu_memory_utilization: 0.9
  enable_expert_parallel: true
  enable_auto_tool_choice: true
  tool_call_parser: qwen3_coder
  reasoning_parser: qwen3
  trust_remote_code: true
  use_deep_gemm: false
  use_flashinfer_sampler: false
  use_flashinfer_moe_fp16: true
  extra_args:
  - --dtype
  - bfloat16
  - --kv-cache-dtype
  - fp8
  - --quantization
  - awq_marlin
  - --compilation-config
  - '{"pass_config":{"fuse_allreduce_rms":false}}'
  - --block-size
  - '2096'
  - --max-num-batched-tokens
  - '32768'
  - --gdn-prefill-backend
  - triton
