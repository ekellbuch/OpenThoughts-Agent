# A4: v5p-8 TP=4 DP=1 EP=on seqs=64 @131k — push seqs (if A2 fits w/ headroom).
#
# DP=1 TP/EP throughput sweep (dodges the multi-host DP=2 decode bug marin#6136).
# Single-host v5p-8 (4 chips) → decode-guaranteed-clean at any seqs. Tests whether
# 131k fits single-host and at what throughput. Base = S1 (32k seqs=64), lifted to
# 131k with seqs=32 + chunked prefill (16384). KV budget at 131k: seqs=32 × 131k ×
# DP=1 = ~4.2M tokens / TP=4 = ~1M tok/chip × ~16 KiB FP8 = ~16 GB/chip; + weights
# 30.5 GB/chip = ~47 GB/chip, inside 95 GiB. If it OOMs, drop to A1 (seqs=16).
# Companion: A3 (EP off), B2 (v5p-16 TP=8).

env_vars:
  RUNAI_STREAMER_CONCURRENCY: '4'
  MODEL_IMPL_TYPE: vllm
  AWS_ENDPOINT_URL: https://storage.googleapis.com

engine:
  type: vllm_local
  model: gs://marin-models-us/ot-agent/models/Qwen/Qwen3.5-122B-A10B-FP8/
  max_output_tokens: 8192
  healthcheck_interval: 1800
  vllm_local: {}
backend:
  type: ray
  wait_for_endpoint: true
vllm_server:
  model_path: gs://marin-models-us/ot-agent/models/Qwen/Qwen3.5-122B-A10B-FP8/
  num_replicas: 1
  tensor_parallel_size: 4
  pipeline_parallel_size: 1
  data_parallel_size: 1
  time_limit: '48:00:00'
  max_model_len: 131072
  max_num_seqs: 64
  gpu_memory_utilization: 0.85
  enable_expert_parallel: true
  enable_auto_tool_choice: true
  tool_call_parser: qwen3_coder
  reasoning_parser: qwen3
  trust_remote_code: true
  extra_args:
  - --dtype
  - bfloat16
  - --kv-cache-dtype
  - fp8
  - --load-format
  - runai_streamer
  - --block-size
  - '64'
  - --max-num-partial-prefills
  - '1'
  - --limit-mm-per-prompt
  - '{"image":0,"video":0}'
  - --max-num-batched-tokens
  - '16384'
