# Qwen3.5-122B-A10B-FP8 — v5p-32 Q7: 32k seqs=8 + FP8 KV cache.
#
# Fills the missing grid cell at the intersection of Q4 (seqs=8, bf16 KV)
# and Q5 (seqs=4, FP8 KV). Q4 won 32k with 466 mean / 728 peak; FP8 KV
# halves the KV footprint and could allow more concurrent decoding within
# the same HBM budget if KV becomes the bottleneck at seqs=8.

env_vars:
  RUNAI_STREAMER_CONCURRENCY: '4'
  MODEL_IMPL_TYPE: vllm
  AWS_ENDPOINT_URL: https://storage.googleapis.com

engine:
  type: vllm_local
  model: gs://marin-models-us/ot-agent/models/Qwen/Qwen3.5-122B-A10B-FP8/
  max_output_tokens: 8192
  healthcheck_interval: 1800
  vllm_local: {}
backend:
  type: ray
  wait_for_endpoint: true
vllm_server:
  model_path: gs://marin-models-us/ot-agent/models/Qwen/Qwen3.5-122B-A10B-FP8/
  num_replicas: 1
  tensor_parallel_size: 8
  pipeline_parallel_size: 1
  data_parallel_size: 2
  time_limit: '48:00:00'
  max_model_len: 32768
  max_num_seqs: 8
  gpu_memory_utilization: 0.85
  enable_expert_parallel: true
  enable_auto_tool_choice: true
  tool_call_parser: qwen3_coder
  reasoning_parser: qwen3
  trust_remote_code: true
  extra_args:
  - --dtype
  - bfloat16
  - --kv-cache-dtype
  - fp8
  - --load-format
  - runai_streamer
  - --block-size
  - '64'
  - --max-num-partial-prefills
  - '1'
  - --limit-mm-per-prompt
  - '{"image":0,"video":0}'
  - --max-num-batched-tokens
  - '32768'
