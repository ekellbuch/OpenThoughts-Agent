# B4: v5p-16 TP=8 DP=1 EP=on seqs=64 @131k — push seqs (more KV room at TP=8).
#
# DP=1 TP/EP throughput sweep. TP=8 spans 2 hosts (v5p-16 = 8 chips) but DP=1,
# so it is multi-host but NOT the DP=2 continuous-batching path that marin#6136
# fingerprints. MUST decode-quality-check (multi-host DP=1 is unvalidated). More
# chips than A2 → more KV room → can push seqs higher (see B4). Weights 122 GB /
# TP=8 = 15.25 GB/chip; KV at 131k seqs=32 / TP=8 ~ 8 GB/chip; ample headroom.
# Companion: A2 (v5p-8 TP=4), B3 (EP off).

env_vars:
  RUNAI_STREAMER_CONCURRENCY: '4'
  MODEL_IMPL_TYPE: vllm
  AWS_ENDPOINT_URL: https://storage.googleapis.com

engine:
  type: vllm_local
  model: gs://marin-models-us/ot-agent/models/Qwen/Qwen3.5-122B-A10B-FP8/
  max_output_tokens: 8192
  healthcheck_interval: 1800
  vllm_local: {}
backend:
  type: ray
  wait_for_endpoint: true
vllm_server:
  model_path: gs://marin-models-us/ot-agent/models/Qwen/Qwen3.5-122B-A10B-FP8/
  num_replicas: 1
  tensor_parallel_size: 8
  pipeline_parallel_size: 1
  data_parallel_size: 1
  time_limit: '48:00:00'
  max_model_len: 131072
  max_num_seqs: 64
  gpu_memory_utilization: 0.85
  enable_expert_parallel: true
  enable_auto_tool_choice: true
  tool_call_parser: qwen3_coder
  reasoning_parser: qwen3
  trust_remote_code: true
  extra_args:
  - --dtype
  - bfloat16
  - --kv-cache-dtype
  - fp8
  - --load-format
  - runai_streamer
  - --block-size
  - '64'
  - --max-num-partial-prefills
  - '1'
  - --limit-mm-per-prompt
  - '{"image":0,"video":0}'
  - --max-num-batched-tokens
  - '16384'
