engine:
  type: vllm_local
  model: s3://mmlaion/ot-agent/models/QuantTrio/MiniMax-M2.7-AWQ/
  max_output_tokens: 4096
  healthcheck_interval: 900
  vllm_local: {}
backend:
  type: ray
  wait_for_endpoint: true
vllm_server:
  model_path: s3://mmlaion/ot-agent/models/QuantTrio/MiniMax-M2.7-AWQ/
  num_replicas: 1
  tensor_parallel_size: 16
  pipeline_parallel_size: 1
  data_parallel_size: 1
  time_limit: '48:00:00'
  max_model_len: 32768
  max_num_seqs: 8
  gpu_memory_utilization: 0.85
  enable_expert_parallel: true
  enable_auto_tool_choice: true
  tool_call_parser: minimax_m2
  reasoning_parser: minimax_m2
  trust_remote_code: true
  extra_args:
  - --dtype
  - bfloat16
  - --load-format
  - runai_streamer
  - --block-size
  - '64'
  - --max-num-partial-prefills
  - '1'
  - --limit-mm-per-prompt
  - '{"image":0,"video":0}'
  - --chat-template-content-format
  - string
  - --max-num-batched-tokens
  - '32768'
