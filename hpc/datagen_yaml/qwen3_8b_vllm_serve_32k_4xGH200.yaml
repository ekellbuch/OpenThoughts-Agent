engine:
  type: vllm_local
  model: Qwen/Qwen3-8B
  max_output_tokens: 16384
  healthcheck_interval: 300
  vllm_local: {}
backend:
  type: ray
  wait_for_endpoint: true
vllm_server:
  model_path: Qwen/Qwen3-8B
  num_replicas: 4
  tensor_parallel_size: 1
  pipeline_parallel_size: 1
  data_parallel_size: 1
  time_limit: '11:59:00'
  max_model_len: 32768
  max_num_seqs: 32
  gpu_memory_utilization: 0.9
  swap_space: 12
  enable_expert_parallel: false
  # SERA-style models (axolotl SFT on Sera-4.6-Lite-T2) are trained to emit
  # tool calls as raw text inside `content` using <tool_call>{...}</tool_call>
  # markers — NOT via OpenAI structured tool_calls. vLLM's tool_call_parser
  # would strip those markers into a structured `tool_calls` field on the
  # response, which then gets re-rendered by the chat template differently
  # from what the model saw in training → model goes OOD after a couple of
  # turns. SERA's reference 8B eval (32.3% on swebench-verified-random-100)
  # does NOT enable these parsers. Keep them off; let SWE-agent parse raw
  # text with parse_function=thought_action instead.
  enable_auto_tool_choice: false
  extra_args:
  - --dtype
  - bfloat16
  - --block-size
  - '16'
  - --enable-chunked-prefill
  - --max-num-partial-prefills
  - '1'
  - --enable-prefix-caching
