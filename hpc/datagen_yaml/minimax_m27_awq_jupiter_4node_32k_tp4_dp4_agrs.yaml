# MiniMax-M2.7-AWQ-4bit — AWQ 4-bit quantized (~229B params)
# https://huggingface.co/cyankiwi/MiniMax-M2.7-AWQ-4bit
#
# 32K context — Jupiter GH200 4-node TP=4 / DP=4 variant.
#
# DIAGNOSTIC PROBE (2026-05-26): clone of the 2node_tp4_dp2_agrs config with
# data_parallel_size 2 -> 4. Purpose: GLM-4.7 ran clean at exactly TP=4/DP=4
# on this same wheel (job 493343), while MiniMax-AWQ hangs at TP=4/DP=2 in the
# agrs reduce_scatterv. This run tests whether DP=2 is *uniquely* broken (a
# 2-party rendezvous edge) vs MiniMax×DP>1 broken at any degree:
#   - DP=4 clean  -> DP=2 uniquely broken; DP=4 is also a 4x-throughput config.
#   - DP=4 hangs  -> MiniMax×DP>1 degree-independent; DP=1 fallback.
# Carries the current vLLM patch state (v11 = v7+v9+v10, v8 reverted).
#
# Hardware: 4 nodes × 4× GH200 96GB = 16 GPUs total
#   - Each DP replica owns one full node (TP=4 within node).
#   - 4 DP replicas → 4× throughput vs DP=1.
#   - DP coordination is cross-node over the 4-rank DP group (Gloo/TCPStore).
#   - Memory: AWQ 4-bit experts ~115 GB / 16 EP ranks ≈ 7 GB/GPU experts,
#     even roomier than the DP=2 layout (~14 GB/GPU). Fine at 0.9 util.
#
# Required launch flags:
#   --num_nodes 4 --gpus_per_node 4

engine:
  type: vllm_local
  model: cyankiwi/MiniMax-M2.7-AWQ-4bit
  max_output_tokens: 8192
  healthcheck_interval: 300
  request_params:
    temperature: 0.7
    top_p: 0.95
  vllm_local: {}
backend:
  type: ray
  wait_for_endpoint: true
  ray_cgraph_max_inflight_executions: 16
  healthcheck_max_attempts: 160
  healthcheck_retry_delay: 15
vllm_server:
  model_path: cyankiwi/MiniMax-M2.7-AWQ-4bit
  num_replicas: 1
  tensor_parallel_size: 4
  pipeline_parallel_size: 1
  data_parallel_size: 4
  time_limit: '11:59:00'
  max_model_len: 32768
  max_num_seqs: 32
  gpu_memory_utilization: 0.9
  enable_expert_parallel: true
  enable_auto_tool_choice: true
  tool_call_parser: minimax_m2
  reasoning_parser: minimax_m2
  trust_remote_code: true
  use_deep_gemm: false
  use_flashinfer_sampler: false
  use_flashinfer_moe_fp16: true
  pynccl_trace_flush_interval_sec: 300
  pynccl_pyspy_on_sigusr1: true
  pynccl_faulthandler_interval_sec: 0
  extra_args:
  - --dtype
  - bfloat16
  - --kv-cache-dtype
  - fp8
  # 2026-05-27: --enforce-eager REPLACED by fuse_allreduce_rms=false (compiled DP>1).
  # DP>1 capture crash was flashinfer MNNVL fused allreduce on cross-node IB, not
  # capture itself; disabling fuse_allreduce_rms lets compiled DP=4 capture cleanly.
  # See reference_minimax_dp_mnnvl_fix (DP=2 validated job 524021; DP=4 confirming).
  - --compilation-config
  - '{"pass_config":{"fuse_allreduce_rms":false}}'
  - --chat-template-content-format
  - string
  - --max-num-batched-tokens
  - '32768'
  - --all2all-backend
  - allgather_reducescatter
  # Ray actor DP backend (per-node placement). --data-parallel-size-local 1
  # keeps one DP rank per node, so DP=4 spans 4 nodes (each TP=4 within a node).
  - --data-parallel-backend
  - ray
  - --data-parallel-size-local
  - '1'
  # vllm_utils.VLLMServer.start() auto-injects --data-parallel-address
  # <ray head_ip> when data_parallel_size > 1.
