# Kimi-K2.5 INSTANT MODE - Non-thinking multimodal agentic model
# https://huggingface.co/moonshotai/Kimi-K2.5
#
# Instant mode (thinking disabled):
#   - Recommended for SWE-bench and similar tasks
#   - Lower temperature (0.6 vs 1.0)
#   - Shorter outputs (no thinking block)
#   - Use extra_body={'chat_template_kwargs': {"thinking": False}} in API calls
#
# Hardware: 8x H200 80GB (~640GB total, model needs ~600GB for INT4)
#
engine:
  type: vllm_local
  model: moonshotai/Kimi-K2.5
  max_output_tokens: 8192  # Shorter than thinking mode
  healthcheck_interval: 300
  request_params:
    temperature: 0.6  # Recommended for instant (non-thinking) mode
    top_p: 0.95
  vllm_local: {}
backend:
  type: ray
  wait_for_endpoint: true
  ray_cgraph_max_inflight_executions: 16
  healthcheck_max_attempts: 160
  healthcheck_retry_delay: 15
vllm_server:
  model_path: moonshotai/Kimi-K2.5
  num_replicas: 1
  tensor_parallel_size: 8
  pipeline_parallel_size: 1
  data_parallel_size: 1
  time_limit: '48:00:00'
  max_model_len: 32768
  max_num_seqs: 16
  gpu_memory_utilization: 0.9
  swap_space: 32
  enable_expert_parallel: true
  enable_auto_tool_choice: true
  tool_call_parser: kimi_k2
  # Note: reasoning_parser still needed for proper output parsing even in instant mode
  reasoning_parser: kimi_k2
  trust_remote_code: true
  extra_args:
  # Vision encoder parallelism (required for K2.5 multimodal)
  - --mm-encoder-tp-mode
  - data
  # Quantization (native INT4 from training)
  - --quantization
  - compressed-tensors
  - --kv-cache-dtype
  - fp8
  # Memory/performance optimizations
  - --block-size
  - '16'
  - --enable-chunked-prefill
  - --max-num-partial-prefills
  - '1'
  - --enable-prefix-caching
  - --max-num-batched-tokens
  - '8192'
  # MoE optimizations
  - --all2all-backend
  - pplx
  # CPU offload for memory headroom
  - --cpu-offload-gb
  - '20'
