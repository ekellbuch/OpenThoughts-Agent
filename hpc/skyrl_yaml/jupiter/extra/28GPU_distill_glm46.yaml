# On-Policy Distillation: Qwen3 8B student ← GLM 4.6 AWQ teacher
#
# Smoke test for on-policy distillation with teacher logits.
# Teacher: QuantTrio/GLM-4.6-AWQ (357B MoE, 4-bit AWQ, fp8 KV cache)
# Student: Qwen3-8B (passed via --model_path)
#
# GPU allocation (28 GPUs = 7 nodes × 4 GH200):
#   - Policy FSDP (Qwen3 8B):     2 nodes × 4 = 8 GPUs   (NOT colocated with ref)
#   - Ref FSDP (Qwen3 8B init):   2 nodes × 4 = 8 GPUs   (KL regularization)
#   - Student vLLM (Qwen3 8B):    2 nodes × 4 = 8 engines (TP=1)
#   - Teacher vLLM (GLM 4.6 AWQ): 1 node  × 4 = 1 engine  (TP=4)
#
# NOTE: Requires the on-policy distillation logits entrypoint.
#   The standard terminal_bench entrypoint uses RayPPOTrainer;
#   this config needs DistillationTrainer (or a terminal_bench subclass
#   that inherits from DistillationTrainer and creates teacher engines).
#
# Usage:
#   python -m hpc.launch \
#       --job_type rl \
#       --rl_config jupiter/extra/28GPU_distill_glm46 \
#       --train_data '["DCAgent/code-contests-sandboxes-with-tests"]' \
#       --model_path Qwen/Qwen3-8B \
#       --num_nodes 7 \
#       --time_limit 11:59:00

# SkyRL entrypoint module
# Uses DistillationTrainer + TerminalBenchGenerator (teacher vLLM + Harbor env)
entrypoint: examples.terminal_bench.entrypoints.main_tbench_opd_logits

# Hydra config groups (+ prefix in CLI)
config_groups:
  terminal_bench_config: terminal_bench

# Terminal bench / agentic environment settings
terminal_bench:
  trials_dir: null

  harbor:
    # Agent settings
    name: terminus-2
    max_episodes: 999999
    enable_summarize: false
    store_all_messages: true
    enable_episode_logging: false

    # Strict JSON parser
    strict_json_parser: true

    # Interleaved Thinking Settings
    interleaved_thinking: true
    extra_body:
      chat_template_kwargs:
        enable_thinking: true

    # Timeout settings
    override_timeout_sec: 900

    # Environment settings
    override_cpus: 1
    override_memory_mb: 2048
    override_storage_mb: 2048

    # Auto snapshot (reuse Daytona snapshots by Dockerfile hash)
    auto_snapshot: true

    # Verifier settings
    verifier_override_timeout_sec: 120

    # Retry settings
    max_retries: 3
    min_wait_sec: 60.0
    max_wait_sec: 600.0
    wait_multiplier: 2.0

    exclude_exceptions:
      - VerifierTimeoutError
      - VerifierRuntimeError
      - RewardFileNotFoundError
      - RewardFileEmptyError
      - VerifierOutputParseError

    # Orchestrator settings
    n_concurrent_trials: 768

    # Logging settings
    log_level: INFO

    # Reward shaping (disabled - teacher KL is the training signal)
    enable_reward_shaping: false

    # RLOO-N error classification
    enable_error_classification: true
    mask_exceptions:
      - DaytonaError
      - EnvironmentStartTimeoutError
      - NetworkError
      - ConnectionError
      - RewardFileNotFoundError
      - RewardFileEmptyError
    zero_exceptions:
    default_error_treatment: zero
    passthrough_exceptions:
      - AgentTimeoutError
      - ContextLengthExceededError

  model_info:
    max_input_tokens: 32768
    max_output_tokens: 8192

  archiving:
    enabled: false

# Trainer configuration
trainer:
  strategy: fsdp2
  algorithm:
    # On-policy distillation: no-op advantage (pass-through rewards) + importance sampling loss
    advantage_estimator: no_op
    policy_loss_type: importance_sampling
    use_kl_loss: false
    use_kl_in_reward: true
    kl_loss_coef: 0.0
    eps_clip_low: 0.2
    eps_clip_high: 0.2
    loss_reduction: token_mean

  epochs: 10
  update_epochs_per_batch: 1

  # Batch sizes
  train_batch_size: 64
  policy_mini_batch_size: 64
  eval_batch_size: 64

  micro_forward_batch_size_per_gpu: 4
  micro_train_batch_size_per_gpu: 2

  max_prompt_length: 999999

  eval_interval: 999999
  eval_before_train: false
  ckpt_interval: 5
  resume_mode: latest
  hf_save_interval: 10
  hf_hub_repo_id: null
  hf_hub_private: false
  hf_hub_revision: main

  enable_db_registration: true

  logger: console
  project_name: OpenThoughts-Agent
  log_level: INFO
  tracker_commit_each_step: true

  run_name: null
  ckpt_path: null
  export_path: null

  # Policy optimizer
  policy:
    optimizer_config:
      lr: 3e-5
      weight_decay: 0.01
      adam_betas: [0.9, 0.999]
      max_grad_norm: 1.0
    fsdp_config:
      cpu_offload: false
      reshard_after_forward: false
      fsdp_size: 4

  # Ref model = student initial weights (KL regularization, not the teacher)
  ref:
    fsdp_config:
      cpu_offload: false
      reshard_after_forward: false
      fsdp_size: 4

  placement:
    colocate_all: false
    # IMPORTANT: colocate_policy_ref defaults to true in SkyRL, which puts
    # both policy and ref FSDP on the same 2 nodes. With micro_forward_batch_size=4
    # and 32k context, the activation memory spike (~35GB) OOMs on 95GB GH200s
    # that already hold both model shards + optimizer states.
    # Setting to false gives policy and ref their own 2 nodes each (4 total).
    colocate_policy_ref: false
    policy_num_nodes: 2
    ref_num_nodes: 2
    policy_num_gpus_per_node: 4
    ref_num_gpus_per_node: 4

  fully_async:
    max_staleness_steps: 8
    num_parallel_generation_workers: 128

# Student generator configuration (Qwen3 8B via vLLM)
generator:
  backend: vllm
  timeout_multiplier: 2.0
  model_dtype: bfloat16

  inference_engine_tensor_parallel_size: 1
  num_inference_engines: 8

  n_samples_per_prompt: 8
  eval_n_samples_per_prompt: 8

  gpu_memory_utilization: 0.80

  max_num_seqs: 32
  max_num_batched_tokens: 32768

  enable_prefix_caching: true
  enable_chunked_prefill: true

  run_engines_locally: true
  weight_sync_backend: nccl
  async_engine: true
  batched: false
  enable_http_endpoint: true

  append_eos_token_after_stop_str_in_multi_turn: true
  max_turns: 999999

  sampling_params:
    max_generate_length: 8192
    temperature: 1.0
    top_p: 0.95
    top_k: -1

  engine_init_kwargs:
    max_model_len: 32768

# Teacher model configuration (GLM 4.6 AWQ via vLLM)
# Separate vLLM engine on dedicated GPUs — supports AWQ quantization and fp8 KV cache.
# The teacher scores student-generated sequences via prompt_logprobs to provide
# top-K log-probability distributions for on-policy distillation.
teacher:
  model_path: QuantTrio/GLM-4.6-AWQ
  top_k_logprobs: 256
  num_inference_engines: 1
  inference_engine_tensor_parallel_size: 4
  inference_engine_pipeline_parallel_size: 1
  gpu_memory_utilization: 0.85
  enforce_eager: false
  backend: vllm
  engine_init_kwargs:
    quantization: awq
    kv_cache_dtype: fp8
    dtype: bfloat16
    max_model_len: 32768
    trust_remote_code: true
    enable_chunked_prefill: true

# Data paths
data:
  train_data: []
  val_data: ["open-thoughts/OpenThoughts-TB-dev"]
