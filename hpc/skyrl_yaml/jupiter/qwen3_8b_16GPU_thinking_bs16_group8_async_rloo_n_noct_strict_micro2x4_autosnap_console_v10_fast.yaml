# SkyRL Configuration: Qwen3 8B - FAST GENERATION VARIANT (v10)
# Based on: v3_balanced with speed optimizations
#
# SPEED OPTIMIZATION v10: Reduce generation bottleneck
# Key changes vs v3_balanced (current running job 218235):
#   - max_episodes: 999999 -> 32 (cap agent turns to prevent 900s timeouts)
#   - override_timeout_sec: 900 -> 600 (faster worker turnover on hard problems)
#   - train_batch_size: 64 -> 16 (4x fewer trials needed per step)
#   - policy_mini_batch_size: 64 -> 16 (match train_batch_size)
#   - eval_batch_size: 64 -> 16 (match train_batch_size)
#   - n_concurrent_trials: 256 (keep high for throughput)
#   - num_inference_engines: 8 (keep at 8 -- generation is the bottleneck)
#   - num_parallel_generation_workers: 128 (standard)
#   - max_num_seqs: 32 (standard)
#   - max_num_batched_tokens: 32768 (standard)
#
# Expected impact: 3-5x faster step time due to fewer timeouts + smaller batches
# Trade-off: More total steps (6000 vs 1500), fewer agent turns per problem

entrypoint: examples.terminal_bench.entrypoints.main_tbench

config_groups:
  terminal_bench_config: terminal_bench

terminal_bench:
  trials_dir: null

  harbor:
    name: terminus-2
    max_episodes: 32
    enable_summarize: false
    store_all_messages: true
    enable_episode_logging: false

    strict_json_parser: true

    interleaved_thinking: true
    extra_body:
      chat_template_kwargs:
        enable_thinking: true

    override_timeout_sec: 600

    override_cpus: 1
    override_memory_mb: 2048
    override_storage_mb: 2048

    auto_snapshot: true

    verifier_override_timeout_sec: 120

    max_retries: 3
    min_wait_sec: 60.0
    max_wait_sec: 600.0
    wait_multiplier: 2.0

    exclude_exceptions:
      - AgentTimeoutError
      - VerifierTimeoutError
      - RewardFileNotFoundError
      - RewardFileEmptyError
      - VerifierOutputParseError
      - ContextLengthExceededError

    n_concurrent_trials: 768

    log_level: INFO

    enable_reward_shaping: false

    enable_error_classification: true
    mask_exceptions:
      - DaytonaError
      - EnvironmentStartTimeoutError
      - NetworkError
      - ConnectionError
      - RewardFileNotFoundError
      - RewardFileEmptyError
    zero_exceptions:
      - AgentTimeoutError
      - ContextLengthExceededError
    default_error_treatment: zero

  model_info:
    max_input_tokens: 32768
    max_output_tokens: 8192

  archiving:
    enabled: false

trainer:
  strategy: fsdp2
  algorithm:
    advantage_estimator: rloo_n
    use_kl_loss: true
    kl_loss_coef: 0.01
    eps_clip_low: 0.2
    eps_clip_high: 0.2
    loss_reduction: token_mean

  epochs: 10
  update_epochs_per_batch: 1

  train_batch_size: 16
  policy_mini_batch_size: 16
  eval_batch_size: 16

  micro_forward_batch_size_per_gpu: 4
  micro_train_batch_size_per_gpu: 2

  max_prompt_length: 999999

  eval_interval: 999999
  eval_before_train: false
  ckpt_interval: 10
  resume_mode: latest
  hf_save_interval: 20
  hf_hub_repo_id: null
  hf_hub_private: false
  hf_hub_revision: main

  enable_db_registration: true

  logger: console
  project_name: OpenThoughts-Agent
  log_level: INFO
  tracker_commit_each_step: true

  run_name: null
  ckpt_path: null
  export_path: null

  policy:
    optimizer_config:
      lr: 1e-5
      weight_decay: 0.01
      adam_betas: [0.9, 0.999]
      max_grad_norm: 1.0
    fsdp_config:
      cpu_offload: false
      reshard_after_forward: false
      fsdp_size: 4
  ref:
    fsdp_config:
      cpu_offload: false
      reshard_after_forward: false
      fsdp_size: 4

  placement:
    colocate_all: false
    policy_num_nodes: 2
    ref_num_nodes: 2
    policy_num_gpus_per_node: 4
    ref_num_gpus_per_node: 4

  fully_async:
    max_staleness_steps: 8
    num_parallel_generation_workers: 128

generator:
  backend: vllm
  timeout_multiplier: 2.0
  model_dtype: bfloat16

  inference_engine_tensor_parallel_size: 1
  num_inference_engines: 8

  n_samples_per_prompt: 8
  eval_n_samples_per_prompt: 8

  gpu_memory_utilization: 0.90

  max_num_seqs: 32
  max_num_batched_tokens: 32768

  enable_prefix_caching: true
  enable_chunked_prefill: true

  run_engines_locally: true
  weight_sync_backend: nccl
  async_engine: true
  batched: false
  enable_http_endpoint: true

  append_eos_token_after_stop_str_in_multi_turn: true
  max_turns: 999999

  sampling_params:
    max_generate_length: 8192
    temperature: 1.0
    top_p: 0.95
    top_k: -1

  engine_init_kwargs:
    max_model_len: 32768

data:
  train_data: []
  val_data: ["open-thoughts/OpenThoughts-TB-dev"]
