# =============================================================================
# Iris/CoreWeave dense-8B (Qwen3-8B) RLOO-N + seqnorm + TIS. 7 nodes x 8 H100 = 56 GPU.
# Geometry (disaggregated): 8 policy/ref (1 node) + 48 engines x TP1 (6 nodes) = 56 = 7.
# Port of jupiter/56GPU_seqnorm_tis.yaml (harbor/algorithm/train hparams IDENTICAL to base).
# NOT part of the MoE sharding grid (dense 8B seqnorm/TIS ablation).
#
# Cluster/NCCL/SIF/placement rationale → .claude/ops/iris/coreweave_gpu_ops.md
#   + rl-agentic-launch-iris skill. Port/verifier-timeout debug history →
#   agent_logs/2026-07-08_iris-rl-config-comment-migration.md.
#
# Launch:
#   set -a; source "${DC_AGENT_SECRET_ENV:?see .claude/secret.md}"; set +a
#   export KUBECONFIG=~/.kube/coreweave-iris-gpu
#   python -m rl.cloud.launch_rl_iris \
#     --rl_config hpc/skyrl_yaml/iris/56GPU_seqnorm_tis.yaml \
#     --model_path Qwen/Qwen3-8B \
#     --train_data '["<harbor-task-dataset>"]' \
#     --num-nodes 7 \
#     --rendezvous-dir s3://<bucket>/rl-iris-rdv/<run> \
#     --job-name rl-iris-56gpu-seqnorm-tis --no-wait
# =============================================================================

entrypoint: examples.terminal_bench.entrypoints.main_tbench

# Hydra config groups (+ prefix in CLI)
config_groups:
  terminal_bench_config: terminal_bench

# Terminal bench / agentic environment settings
terminal_bench:
  # R2 (s3://) so rollouts survive pod GC/preempt; cw pods inject R2 creds.
  # null = ephemeral pod-local. --trials-dir auto overrides per-job-name.
  trials_dir: s3://marin-us-east-02a/iris/rl-56gpu-seqnorm-tis/trace_jobs

  harbor:
    name: terminus-2
    max_episodes: 999999
    enable_summarize: false
    store_all_messages: true
    trajectory_config:
      raw_content: true
    enable_episode_logging: false
    record_terminal_session: false
    enable_pane_logging: false

    strict_json_parser: true

    interleaved_thinking: true
    extra_body:
      chat_template_kwargs:
        enable_thinking: true
    # 900s (boundary-hugging a3 datasets hit the timeout wall; see Jupiter base).
    override_timeout_sec: 900

    override_cpus: 1
    override_memory_mb: 2048
    override_storage_mb: 2048

    # Hash-based Daytona snapshot caching.
    auto_snapshot: true

    # 300 (cw verifier-pull ~130s; 120 stranded trials at step 0 — see agent_log 2026-07-08).
    verifier_override_timeout_sec: 300

    max_retries: 3
    min_wait_sec: 60.0
    max_wait_sec: 600.0
    wait_multiplier: 2.0

    exclude_exceptions:
      - VerifierTimeoutError
      - VerifierRuntimeError
      - RewardFileNotFoundError
      - RewardFileEmptyError
      - VerifierOutputParseError

    # Per-job sandbox concurrency; 675 = Jupiter walk-down (marinskyrl.md tuned-ref, ~2:1 w/ workers).
    n_concurrent_trials: 675

    log_level: INFO

    enable_reward_shaping: false

    # REQUIRED for trainer.algorithm.use_tis (asserts non-null rollout_logprobs).
    collect_rollout_details: true

    enable_error_classification: true
    mask_exceptions:
      - DaytonaError
      - EnvironmentStartTimeoutError
      - NetworkError
      - ConnectionError
      - RewardFileNotFoundError
      - RewardFileEmptyError
      - AgentEnvironmentTimeoutError
      - ContextLengthExceededError
    default_error_treatment: zero
    # AgentTimeoutError PASSTHROUGH (partial signal meaningful); ContextLengthExceededError
    # in mask_exceptions (refcount-race rationale — see Jupiter base).
    passthrough_exceptions:
      - AgentTimeoutError
    zero_exceptions: []

  model_info:
    # 32000 (768-token buffer below max_model_len 32768; litellm counter truncates before
    # vLLM rejects — see Jupiter base for the retry-storm/FD-exhaustion rationale).
    max_input_tokens: 32000
    max_output_tokens: 4096

  archiving:
    enabled: false

  trace_upload:
    enabled: true
    repo_org: DCAgent
    episodes: last
    dataset_type: SFT
    cleanup: true

# Trainer configuration
trainer:
  strategy: fsdp2
  algorithm:
    advantage_estimator: rloo_n
    use_kl_loss: false
    kl_loss_coef: 0.0
    eps_clip_low: 0.2
    eps_clip_high: 0.05
    # Global length-unbiased normalizer (Z set programmatically in the driver).
    loss_reduction: seq_mean_token_sum_norm_global
    # Truncated Importance Sampling: clamp(exp(old_log_probs - rollout_logprobs), max=cap).
    # REQUIRES collect_rollout_details=true (harbor block).
    use_tis: true
    tis_imp_ratio_cap: 2.0

  epochs: 2
  max_steps: 80
  update_epochs_per_batch: 1

  train_batch_size: 64
  policy_mini_batch_size: 64
  eval_batch_size: 64

  # Micro batch (micro1x4 variant).
  micro_forward_batch_size_per_gpu: 4
  micro_train_batch_size_per_gpu: 1

  max_prompt_length: 999999

  eval_interval: 999999
  eval_before_train: false
  ckpt_interval: 2
  resume_mode: latest
  hf_save_interval: 5
  # Set via CLI: trainer.hf_hub_repo_id=org/repo
  hf_hub_repo_id: null
  hf_hub_private: false
  hf_hub_revision: main

  # Supabase auto-registration OFF (manual register only).
  enable_db_registration: false

  project_name: OpenThoughts-Agent
  log_level: INFO
  tracker_commit_each_step: true
  logger: wandb  # CoreWeave egress -> wandb to dogml/OpenThoughts-Agent (entity via WANDB_ENTITY, defaulted by launcher)

  run_name: null
  ckpt_path: null
  export_path: null

  policy:
    optimizer_config:
      lr: 8e-6
      weight_decay: 0.0
      adam_betas: [0.9, 0.999]
      max_grad_norm: 0.9
    fsdp_config:
      cpu_offload: false
      reshard_after_forward: true
      fsdp_size: 4
  ref:
    fsdp_config:
      cpu_offload: false
      reshard_after_forward: true
      fsdp_size: 4

  # policy/ref share 8 GPUs = 1 node. --gpus_per_node 8 forces *_num_gpus_per_node (ops doc).
  placement:
    colocate_all: false
    policy_num_nodes: 1
    ref_num_nodes: 1
    policy_num_gpus_per_node: 8
    ref_num_gpus_per_node: 8

  fully_async:
    max_staleness_steps: 16
    # ~1/2 of total Daytona concurrency.
    num_parallel_generation_workers: 338

# Generator configuration
generator:
  backend: vllm
  timeout_multiplier: 1.0
  model_dtype: bfloat16

  inference_engine_tensor_parallel_size: 1
  # 48 engines x TP=1 = 48 gen GPUs; + 8 policy/ref = 56 = 7 nodes.
  num_inference_engines: 48

  n_samples_per_prompt: 8
  eval_n_samples_per_prompt: 8

  # H100-80GB 0.85 (vs Jupiter 0.75). Bump down on KV pressure/fragmentation.
  gpu_memory_utilization: 0.85

  max_num_seqs: 24
  # 16384 cross-cluster default (Jupiter used 65536).
  max_num_batched_tokens: 16384

  enable_prefix_caching: true
  enable_chunked_prefill: true

  run_engines_locally: true
  weight_sync_backend: nccl
  async_engine: true
  batched: false
  enable_http_endpoint: true
  enable_ray_prometheus_stats: false
  vllm_stats_interval: 1
  append_eos_token_after_stop_str_in_multi_turn: true
  max_turns: 999999

  sampling_params:
    max_generate_length: 4096
    temperature: 0.7
    top_p: 0.95
    top_k: 20

  engine_init_kwargs:
    max_model_len: 32768
    # Preserves <think> blocks on ALL turns (stock template strips them).
    # Relative path resolves against /app (synced repo root).
    custom_chat_template_chat_completion_path: chat_templates/qwen3_thinking_acc.jinja2

# Data paths (set via CLI --train_data / --val_data)
data:
  train_data: []
  val_data: []
