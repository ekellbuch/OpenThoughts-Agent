
entrypoint: skyrl_train.entrypoints.main_base

trainer:
  strategy: fsdp2
  algorithm:
    advantage_estimator: grpo
    use_kl_loss: true
  epochs: 3
  train_batch_size: 16
  eval_batch_size: 64
  eval_interval: 50
  eval_before_train: false
  update_epochs_per_batch: 1
  ckpt_interval: 10
  max_prompt_length: 999999
  resume_mode: latest
  project_name: dc-agent
  log_level: INFO
  run_name: null
  ckpt_path: null
  export_path: null

  policy:
    optimizer_config:
      lr: 1.0e-6
      weight_decay: 0.01
      adam_betas: [0.9, 0.999]
      max_grad_norm: 1.0

  ref:
    fsdp_config:
      cpu_offload: false

  placement:
    colocate_all: true
    policy_num_nodes: null
    ref_num_nodes: null
    policy_num_gpus_per_node: null
    ref_num_gpus_per_node: null

generator:
  backend: vllm
  enforce_eager: false
  timeout_multiplier: 2.0
  num_inference_engines: null
  inference_engine_tensor_parallel_size: 1
  n_samples_per_prompt: 4
  gpu_memory_utilization: 0.8
  run_engines_locally: true
  weight_sync_backend: nccl
  async_engine: true
  batched: true

  engine_init_kwargs:
    max_model_len: 32768

data:
  train_data: []
  val_data: []
