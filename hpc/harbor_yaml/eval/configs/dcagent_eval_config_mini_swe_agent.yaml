n_attempts: 3
timeout_multiplier: 1.0
orchestrator:
  type: local
  n_concurrent_trials: 16
  quiet: false
  plain_output: true
  retry:
    max_retries: 10
    exclude_exceptions:
      - AgentTimeoutError
      - AgentEnvironmentTimeoutError
      - BadRequestError
      - VerifierTimeoutError
      - SummarizationTimeout
      - SummarizationTimeoutError
      - ContextLengthExceededError
    wait_multiplier: 1.0
    min_wait_sec: 1.0
    max_wait_sec: 60.0
environment:
  type: daytona
  force_build: false
verifier:
  max_timeout_sec: 14400
agents:
  - name: mini-swe-agent
    max_timeout_sec: 7200
    kwargs:
      cost_limit: "0"
datasets:
  - path: examples/tasks
