# Harbor eval config (no-override variant for swebench/tb2)
# NOTE: jobs_dir is NOT set here — it's passed via `--jobs-dir` CLI flag.
n_attempts: 3
timeout_multiplier: 1.0
orchestrator:
  type: local
  n_concurrent_trials: 4
  quiet: false
  plain_output: true
  retry:
    max_retries: 10
    exclude_exceptions:
      - AgentTimeoutError
      - AgentEnvironmentTimeoutError
      - BadRequestError
      - VerifierTimeoutError
      - SummarizationTimeout
      - SummarizationTimeoutError
      - ContextLengthExceededError
    wait_multiplier: 1.0
    min_wait_sec: 1.0
    max_wait_sec: 60.0
environment:
  type: daytona
  force_build: true
  # delete the sandbox on stop (2026-06-28 leak-fix safety net): the single-container Direct
  # stop() skips delete() when this is false, so any sandbox that falls back to the non-snapshot
  # image path (non-ephemeral, auto_delete_interval=0) would leak forever. The auto_snapshot
  # forwarding in eval_harbor.sbatch is the primary fix (snapshot path -> ephemeral auto-delete);
  # this is belt-and-suspenders for the from-scratch fallback.
  delete: true
verifier:
  max_timeout_sec: 14400
agents:
  - name: terminus-2
    max_timeout_sec: 7200
    trajectory_config:
      raw_content: true
      linear_history: true
    kwargs:
      record_terminal_session: false
      enable_episode_logging: false
      enable_pane_logging: false
      collect_rollout_details: false
      collect_engine_metrics: false
      proactive_summarization_threshold: 2048
      metrics_endpoint: https://replace-with-vllm-host/metrics
      metrics_timeout_sec: 10
      # litellm PER-REQUEST timeout (seconds). Raised 600 (litellm default) -> 1800
      # for the tmax-27b DP2xTP2 ID-eval relaunch (2026-06-24). The default 600s
      # aborted a single 16k-token thinking generation that needed ~1,550s at the
      # old TP=4 per-stream rate (~10 tok/s) -> ~2,900 litellm timeouts + a
      # summarization spiral. terminus-2's `llm_kwargs` flows into LiteLLM(**kwargs)
      # -> spread into every litellm.acompletion() call (harbor llms/lite_llm.py
      # _build_base_kwargs). 1800 is a safe headroom for slow large-model decode and
      # harmless for fast small models (they finish well under it).
      llm_kwargs:
        timeout: 1800
      model_info:
        max_input_tokens: 32768
        max_output_tokens: 16384
        input_cost_per_token: 0
        output_cost_per_token: 0
datasets:
  - path: examples/tasks
