# Harbor eval configuration for SERA-family models via SWE-Agent harness.
# (16 concurrency, 32k context, hosted vLLM through Pinggy tunnel.)
#
# SERA-family SFTs emit tool calls as raw text inside content
# (<think>...</think><tool_call>{...}</tool_call>), not via OpenAI-style
# structured tool_calls. Reference
# DCAgent2/swebench_verified_random_100_folders_SERA_8B_20260422_175644
# confirms the trained format — messages have keys=['content','role']
# only, no structured tool_calls field.
#
# This config pairs with hpc/datagen_yaml/qwen3_8b_vllm_serve_32k_4xGH200_sera.yaml
# (vLLM tool_call_parser + reasoning_parser DISABLED) and sets SWE-agent's
# parse_function to thought_action so the harness parses the raw text for
# actions instead of expecting structured tool_calls.
#
# Requires harbor swe_agent.py nested parse_function CLI fix (commit b9b86fc4).

job_name: swe-agent-sera-eval-job
jobs_dir: trace_jobs
n_attempts: 3
timeout_multiplier: 8.0
debug: false

orchestrator:
  type: local
  n_concurrent_trials: 16
  quiet: false
  plain_output: true
  adaptive_concurrency:
    enabled: false
    algorithm: gradient2
    min_limit:
    max_limit:
    metrics_endpoint:
    metrics_timeout_sec: 10.0
    poll_interval_sec: 120.0
    window_size: 5
    queue_p95_drop_threshold:
    algorithm_kwargs: {}
  retry:
    max_retries: 10
    include_exceptions:
    exclude_exceptions:
    - AgentTimeoutError
    - VerifierTimeoutError
    - RewardFileNotFoundError
    - RewardFileEmptyError
    - VerifierOutputParseError
    - SandboxBuildFailedError
    - VerifierRuntimeError
    - SummarizationTimeoutError
    - ContextLengthExceededError
    wait_multiplier: 2.0
    min_wait_sec: 1.0
    max_wait_sec: 90.0
  kwargs: {}

environment:
  type: daytona
  force_build: true
  delete: true
  override_cpus: 2
  override_memory_mb: 4096
  override_storage_mb: 4096
  kwargs: {}

verifier:
  override_timeout_sec: 1800
  max_timeout_sec: 900
  disable: false

metrics:
  - type: mean-drop-ei
    kwargs: {}
  - type: accuracy-drop-ei
    kwargs: {}

agents:
- name: swe-agent
  import_path:
  model_name: hosted_vllm/placeholder-override-at-runtime
  max_timeout_sec:
  kwargs:
    # SERA models were trained on raw-text tool-call markers, not OpenAI
    # structured tool_calls. Parse the text with thought_action instead of
    # the swe-agent default (function_calling).
    parse_function: thought_action
    model_info:
      max_input_tokens: 32768
      max_output_tokens: 8192
      input_cost_per_token: 0
      output_cost_per_token: 0

datasets:
- path: /replace/with/tasks/path

tasks: []
