# Harbor eval configuration for SWE-Agent with hosted vLLM (16 concurrency, 32k context).
# For use with Pinggy tunnels to expose vLLM endpoints to installed agents.
# This is the full SWE-agent scaffold that SERA was trained on.

job_name: swe-agent-eval-job
jobs_dir: trace_jobs
n_attempts: 3
timeout_multiplier: 8.0
debug: false

orchestrator:
  type: local
  n_concurrent_trials: 16
  quiet: false
  plain_output: true
  adaptive_concurrency:
    enabled: false
    algorithm: gradient2
    min_limit:
    max_limit:
    metrics_endpoint:
    metrics_timeout_sec: 10.0
    poll_interval_sec: 120.0
    window_size: 5
    queue_p95_drop_threshold:
    algorithm_kwargs: {}
  retry:
    max_retries: 10
    include_exceptions:
    exclude_exceptions:
    - AgentTimeoutError
    - VerifierTimeoutError
    - RewardFileNotFoundError
    - RewardFileEmptyError
    - VerifierOutputParseError
    - SandboxBuildFailedError
    - VerifierRuntimeError
    - SummarizationTimeoutError
    - ContextLengthExceededError
    wait_multiplier: 2.0
    min_wait_sec: 1.0
    max_wait_sec: 90.0
  kwargs: {}

environment:
  type: daytona
  force_build: true
  delete: true
  override_cpus: 2
  override_memory_mb: 4096
  override_storage_mb: 4096
  kwargs: {}

verifier:
  override_timeout_sec: 1800
  max_timeout_sec: 900
  disable: false

metrics:
  - type: mean-drop-ei
    kwargs: {}
  - type: accuracy-drop-ei
    kwargs: {}

agents:
- name: swe-agent
  import_path:
  model_name: hosted_vllm/placeholder-override-at-runtime
  max_timeout_sec:
  kwargs:
    # SERA / Sera-4.6-Lite-T2-v4 axolotl SFTs emit tool calls as raw text
    # markers (<tool_call>{...}</tool_call>) in `content`, not via OpenAI
    # structured tool_calls. Match the format SERA-8B's reference eval uses
    # (32.3% on swebench-verified-random-100): parse the text with
    # thought_action, and keep vLLM's tool_call_parser + auto_tool_choice
    # DISABLED in the matching datagen_yaml. Requires the harbor
    # nested-parse_function CLI fix (swe_agent.py, commit b9b86fc4).
    parse_function: thought_action
    model_info:
      max_input_tokens: 32768
      max_output_tokens: 8192
      input_cost_per_token: 0
      output_cost_per_token: 0

datasets:
- path: /replace/with/tasks/path

tasks: []
