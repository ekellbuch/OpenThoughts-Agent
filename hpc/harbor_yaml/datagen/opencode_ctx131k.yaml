# Harbor datagen (trace-generation) config — opencode agent, 131k context, Daytona (cloud).
#
# 131k sibling of opencode_ctx32k.yaml. opencode is Harbor's literal-token-capable installed
# agent (SUPPORTS_LITERAL_TRACES=True): run behind harbor's RecordProxy it records per-turn
# prompt/completion token IDs + logprobs into a literal.jsonl the agent merges back into its
# trajectory. To capture those on the iris TPU path, launch with `--record_literal
# --ingress_mode controller --ingress_host <host>` (co-locates the RecordProxy in front of the
# TPU-served vLLM, registers it with the iris controller, and routes the agent endpoint through
# it) and export with `make_and_upload_trace_dataset.py --include_literal_tokens`.
#
# The 131k window itself is served by the ENGINE config (max_model_len=131072 in
# hpc/datagen_yaml/extra/qwen3_5_122b_a10b_fp8_runai_v5p8_131k_dp1_tp4_ep1_s32.yaml). The
# model_info.max_input_tokens below (114688 = 131072 - 16384 output headroom) mirrors the
# terminus-2 ctx131k.yaml sibling so harbor's proactive context management caps input before
# it overflows vLLM.
#
# Model routing: opencode requires model_name in `provider/model` form. The `openai` provider
# makes opencode read OPENAI_BASE_URL / OPENAI_API_KEY (which the launcher populates from the
# served-vLLM / ingress endpoint), so leave `openai/override-at-runtime` here — the launcher
# fills the real served-model id + endpoint at runtime.

job_name: default-trace-job
jobs_dir: trace_jobs
n_attempts: 1
timeout_multiplier: 1.0
debug: false
orchestrator:
  type: local
  n_concurrent_trials: 48
  quiet: false
  plain_output: true
  adaptive_concurrency:
    enabled: false
    algorithm: gradient2
    min_limit: null
    max_limit: null
    metrics_endpoint: null
    metrics_timeout_sec: 10.0
    poll_interval_sec: 120.0
    window_size: 5
    queue_p95_drop_threshold: null
    algorithm_kwargs: {}
  retry:
    max_retries: 10
    include_exceptions:
    - DaytonaRateLimitError
    exclude_exceptions:
    - AgentTimeoutError
    - VerifierTimeoutError
    - RewardFileNotFoundError
    - RewardFileEmptyError
    - VerifierOutputParseError
    - SandboxBuildFailedError
    - VerifierRuntimeError
    wait_multiplier: 2.0
    min_wait_sec: 1.0
    max_wait_sec: 90.0
  kwargs: {}
environment:
  type: daytona
  force_build: false
  delete: true
  override_cpus: 1
  override_memory_mb: 2048
  override_storage_mb: 2048
  kwargs:
    auto_snapshot: true
verifier:
  override_timeout_sec: null
  max_timeout_sec: null
  disable: true
metrics: []
agents:
- name: opencode
  import_path: null
  model_name: openai/override-at-runtime
  override_timeout_sec: 1800
  max_timeout_sec: null
  override_setup_timeout_sec: 600
  kwargs:
    # 131k context window (matches the engine's max_model_len=131072). Mirrors the
    # terminus-2 ctx131k.yaml model_info block; harbor uses max_input_tokens for
    # proactive context management so oversized prompts are capped before vLLM.
    model_info:
      max_input_tokens: 114688
      max_output_tokens: 16384
      input_cost_per_token: 0
      output_cost_per_token: 0
    # Per-job opencode.json overrides (deep-merged into the auto-generated config).
    opencode_config: {}
datasets:
- path: /replace/with/tasks/path
tasks: []
