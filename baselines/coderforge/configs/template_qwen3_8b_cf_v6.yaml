
base_model: Qwen/Qwen3-8B
deepspeed: /e/scratch/jureap59/feuer1/code/axolotl/deepspeed_configs/zero3_bf16.json

load_in_8bit: false
load_in_4bit: false


chat_template: tokenizer_default
datasets:
  - path: laion/CoderForge-Preview-v6-__SIZE__
    data_files:
      - coderforge-preview_v6___SIZE__.jsonl
    type: chat_template
    field_messages: messages
    ds_type: json
    message_field_training: train

dataset_prepared_path: /e/data1/datasets/playground/ot-baf/axolotl_dataset_cache/cf-v6-__SIZE__
output_dir: /e/data1/datasets/playground/ot-baf/checkpoints/cf-v6-__SIZE__-axolotl__Qwen3-8B

sequence_len: 32768

wandb_project:
wandb_entity:
wandb_watch:
