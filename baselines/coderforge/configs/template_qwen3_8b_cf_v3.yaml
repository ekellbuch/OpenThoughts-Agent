# CoderForge v3 axolotl config template.
# Consumes the pre-tokenized laion/CoderForge-Preview-v3-<SIZE> datasets.
# Axolotl auto-detects pre-tokenized via input_ids + attention_mask + labels
# (_is_dataset_already_tokenized) and skips chat_template rendering entirely.
# Fill __SIZE__ via sed-substitution.

base_model: Qwen/Qwen3-8B
deepspeed: /e/scratch/jureap59/feuer1/code/axolotl/deepspeed_configs/zero3_bf16.json

load_in_8bit: false
load_in_4bit: false

# plugins disabled 2026-04-22: CCE + bf16 + flash-attn on aarch64/torch2.9 caused
# gradient explosion (grad_norm 9.8e+11) and loss -> 0 within first 3-7 steps.
# plugins:
#   - axolotl.integrations.cut_cross_entropy.CutCrossEntropyPlugin

# chat_template still set so tokenizer can be loaded, even though axolotl
# bypasses template rendering for pre-tokenized data.
# tokenizer_default — inherits stock Qwen3-8B template which correctly handles
# tool_calls + role:tool. `chatml` writes a bare 292-byte chat_template.jinja
# that overrides tokenizer_config at inference time and drops tool_call fields,
# causing catastrophic degenerate output (pages of " 8888..."). Same bug that
# broke Sera v1; see CF_DIAGNOSIS.md and axolotl_retrain_diagnosis_coderforge.md.
chat_template: tokenizer_default
datasets:
  - path: laion/CoderForge-Preview-v3-__SIZE__
    # No `type:` specified — axolotl's _is_dataset_already_tokenized() fires
    # early and returns the dataset as-is.
    ds_type: parquet

dataset_prepared_path: /e/data1/datasets/playground/ot-baf/axolotl_dataset_cache/cf-v3-__SIZE__
output_dir: /e/data1/datasets/playground/ot-baf/checkpoints/cf-v3-__SIZE__-axolotl__Qwen3-8B
hub_model_id: laion/CoderForge-Preview-v3-__SIZE__-axolotl__Qwen3-8B
hub_strategy: end

# Upstream pre-tokenized sequences can exceed 80k tokens; matches Sera v3 truncation.
sequence_len: 32768

wandb_project:
wandb_entity:
wandb_watch:
wandb_name: cf-v3-__SIZE__-axolotl__Qwen3-8B
wandb_log_model:

# Matches upstream SERA config's optimization hparams for apples-to-apples.
gradient_accumulation_steps: 8
micro_batch_size: 1
num_epochs: 3
optimizer: adamw_torch
lr_scheduler: cosine
learning_rate: 1e-5
adam_beta1: 0.9
adam_beta2: 0.95

bf16: auto
tf32: false

gradient_checkpointing: true
activation_offloading: true
resume_from_checkpoint:
logging_steps: 1
flash_attention: true

loss_watchdog_threshold: 5.0
loss_watchdog_patience: 3

warmup_ratio: 0.1875
evals_per_epoch: 0
save_strategy: epoch

weight_decay: 0.01
max_grad_norm: 1.0
special_tokens:
